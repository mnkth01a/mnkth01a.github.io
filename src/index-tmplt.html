<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="UTF-8">

   <title>Product Template</title>

   <!-- Stylesheet -->
   <link rel="stylesheet" href="../style/style.css">
   <link rel="stylesheet" href="../style/product-template.css">
   
   <!-- Google Fonts -->

   <!-- Abril Fatface -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

      href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet">

   <!-- Work Sans -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"

<body>
   <header class="header" id="header">
      <h1 class="logo">Desmotos Arts & Crafts</h1>
   </header>

   <main class="main" id="main">
      <article class="products" id="products">

         <!-- Section for brushes -->
         <section class="product" id="brushes">
            <a href="../index.html">

               <h2 class="item" id="brush">Brushes</h2>
               <figure class="product_img">
                  <img src="../images/hacksaw.jpeg" alt="hacksaw brushes">
                  <figcaption>
                     <h3>Hacksaw Brushes</h3>
                  </figcaption>
               </figure>
               <p class="descr">Made of the highest quality oak,<br /> Hacksaw brushes are known for thier weight and
                  ability to
                  hold<br />paint in large amounts.<br /> Available in different sizes.<br />
                  <span class="price"><br />Starting at $3.00 /
                     brush.
                  </span>
               </p>
            </a>
         </section>

      </article>
   </main>

   <!-- Footer styling -->
   <footer class="footer" id="footer">

      <nav class="footer_nav" id="footer_nav">
         <ul>
            <li><a class="btn" href="../index.html">Home</a></li>
            <li><a class="btn" href="./frames.html">Frames</a></li>
            <li><a class="btn" href="./paints.html">Paints</a></li>
         </ul>
      </nav>

      <p>Copyright &copy; 2023 Desmotos Arts & Crafts </p>
   </footer>
